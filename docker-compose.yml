version: "3.9"

services:
  tgi:
    image: ghcr.io/huggingface/text-generation-inference:latest
    container_name: tgi
    ports:
      - "8000:8000"
    command: >
      --model-id facebook/opt-1.3b
      --port 8000
    volumes:
      - ./models:/data   # opcional, se quiser montar modelos locais
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
