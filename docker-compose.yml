version: "3.9"

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8000:8000"
    command: >
      --model facebook/opt-1.3b
      --port 8000
    volumes:
      - ./models:/models   # opcional, se quiser montar modelos locais
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
